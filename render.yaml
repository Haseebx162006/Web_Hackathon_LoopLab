services:
  - type: web
    name: web-hackathon-backend
    env: node
    rootDir: backend/app
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_CALLBACK_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: MONGO_MAX_POOL_SIZE
        sync: false
      - key: MONGO_MIN_POOL_SIZE
        sync: false
      - key: MONGO_MAX_IDLE_TIME_MS
        sync: false
      - key: MONGO_CONNECT_TIMEOUT_MS
        sync: false
      - key: MONGO_SOCKET_TIMEOUT_MS
        sync: false
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        sync: false
